# Chaos Mesh Workflow: major-upgrade scenario.
#
# Acceptance test for the SeiNodeTask MVP. Expresses
# sei-chain/integration_test/upgrade_module/major_upgrade_test.yaml as a
# composition of SeiNodeTask CRs driven by the seitask runner.
#
# Provisions a 4-validator chain in-workflow via provision-snd, runs the
# upgrade pipeline against it, uploads the run snapshot to S3. Matches the
# release-test/load-test pattern: SND lifecycle and workflow-vars ConfigMap
# all carry ownerRef to this Workflow CR, so the wrapper's only cleanup duty
# is `kubectl delete workflow`.
#
# Upgrade mechanism: a single bump-snd-image step patches the SND template
# image; the SND controller rolls all validators onto the new binary. The
# SND template is the one source of truth for child image -- per-child
# UpdateNodeImage would fight the controller's template re-assertion and
# churn the StatefulSet so the rollout never settles.
#
# Workflow-vars producers/consumers
# ---------------------------------
# provision-validator-chain seeds CHAIN_ID + VALIDATOR_TM_RPC + VALIDATOR_REST.
# compute-target-height patches TARGET_HEIGHT/UPGRADE_HEIGHT/POST_UPGRADE_HEIGHT.
# resolve-proposal-id patches PROPOSAL_ID. Every downstream step consumes via
# `envFrom: configMapRef`; runner steps use `$(VAR)` (K8s container env
# interpolation) inside --var args.
#
# PROPOSAL_ID resolution (chain-as-medium)
# ----------------------------------------
# .status.outputs.govSoftwareUpgrade.proposalId is empty by design (no
# sidecar-derived structured outputs in MVP). The resolve-proposal-id step
# polls /cosmos/gov/v1beta1/proposals?proposal_status=2 (voting period) until
# a proposal matching $SEI_UPGRADE_NAME appears, then patches PROPOSAL_ID.
#
# Placeholders (wrapper envsubst's at apply time -- see scenarios/README.md):
#   $SEI_NAMESPACE         namespace of workflow + provisioned SND
#   $SEI_CHAIN_ID          chain id; also the SND name
#   $SEI_PRE_UPGRADE_IMG   seid image the validators boot on
#   $SEI_POST_UPGRADE_IMG  seid image the upgrade rolls out to
#   $SEI_UPGRADE_NAME      upgrade plan name registered in seid
#   $SEITASK_IMAGE         seitask monolith image (SND templates baked in)
#   $SEI_WORKFLOW_RUN_ID   unique per-run id; suffixes Workflow + CM names
---
apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: major-upgrade-$SEI_WORKFLOW_RUN_ID
  labels:
    sei.io/scenario: major-upgrade
    sei.io/workflow-run: "$SEI_WORKFLOW_RUN_ID"
spec:
  entry: major-upgrade
  templates:
    - name: major-upgrade
      templateType: Serial
      deadline: 90m
      children:
        - provision-validator-chain
        - compute-target-height
        - submit-upgrade-proposal
        - resolve-proposal-id
        - vote-yes-all-validators
        - wait-for-proposal-to-pass
        - bump-snd-image
        - await-post-upgrade-progress
        - upload-report

    # Every seitask container projects Workflow identity via downward API:
    # NAME from the chaos-mesh.org/workflow label chaos-mesh stamps on each
    # Task pod, NAMESPACE from the pod's own metadata. UID isn't projectable
    # so taskruntime.LoadWorkflowIdentity fetches it via the apiserver using
    # NAME + NAMESPACE.
    - name: provision-validator-chain
      templateType: Task
      deadline: 25m
      task:
        container:
          name: seitask
          image: $SEITASK_IMAGE
          args:
            - provision-snd
            - --role=validator
            - --name=$SEI_CHAIN_ID
            - --template=/scenarios/major-upgrade/validator.yaml.tmpl
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=IMAGE=$SEI_PRE_UPGRADE_IMG
            - --ready-timeout=18m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace

    # Sets upgrade height = current + 200 blocks (~120s at Sei's ~600ms block
    # time) to outlast the 60s gov voting_period plus tally + plan-execution
    # slack. Patches the workflow-vars ConfigMap (seeded by provision-snd) with:
    #   TARGET_HEIGHT       -- upgrade height
    #   UPGRADE_HEIGHT      -- consumed by gov-software-upgrade.yaml.tmpl
    #   POST_UPGRADE_HEIGHT -- TARGET_HEIGHT + 10; liveness check threshold
    - name: compute-target-height
      templateType: Task
      deadline: 5m
      task:
        container:
          name: compute-target-height
          image: alpine/k8s:1.31.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              CUR=""
              for i in $(seq 1 30); do
                CUR=$(curl -fsS --connect-timeout 3 "${VALIDATOR_TM_RPC}/status" 2>/dev/null \
                  | sed -n 's/.*"latest_block_height":"\([0-9]*\)".*/\1/p' || true)
                if [ -n "${CUR}" ]; then
                  echo "got height=${CUR} on attempt=${i}"
                  break
                fi
                echo "attempt=${i} RPC not ready yet; retrying in 3s"
                sleep 3
              done
              if [ -z "${CUR}" ]; then
                echo "failed to parse latest_block_height from ${VALIDATOR_TM_RPC}/status after 30 attempts" >&2
                exit 1
              fi
              TARGET=$((CUR + 200))
              POST=$((TARGET + 10))
              echo "current=${CUR} target=${TARGET} post=${POST}"
              kubectl patch configmap "workflow-vars-major-upgrade-${SEI_WORKFLOW_RUN_ID}" \
                --type=merge \
                --patch "{\"data\":{\"TARGET_HEIGHT\":\"${TARGET}\",\"UPGRADE_HEIGHT\":\"${TARGET}\",\"POST_UPGRADE_HEIGHT\":\"${POST}\"}}"
          env:
            - name: SEI_WORKFLOW_RUN_ID
              value: "$SEI_WORKFLOW_RUN_ID"
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    # Submits software-upgrade proposal at UPGRADE_HEIGHT via node-0's sidecar.
    - name: submit-upgrade-proposal
      templateType: Task
      deadline: 10m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/gov-software-upgrade.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-0
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=TITLE=major-upgrade scenario
            - --var=DESCRIPTION=software-upgrade to $SEI_UPGRADE_NAME
            - --var=UPGRADE_NAME=$SEI_UPGRADE_NAME
            - --var=UPGRADE_HEIGHT=$(UPGRADE_HEIGHT)
            - --var=INITIAL_DEPOSIT=20000000usei
            - --var=FEES=10000usei
            - --var=GAS=500000
            - --timeout=8m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    # Polls gov REST for a voting-period proposal whose content.plan.name
    # matches $SEI_UPGRADE_NAME (legacy shape) OR messages[].content.plan.name
    # (v1 shape). Writes PROPOSAL_ID to workflow-vars. 150 * 2s = 300s window.
    - name: resolve-proposal-id
      templateType: Task
      deadline: 5m
      task:
        container:
          name: resolve-proposal-id
          image: alpine/k8s:1.31.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              for i in $(seq 1 150); do
                BODY=$(curl -fsS "${VALIDATOR_REST}/cosmos/gov/v1beta1/proposals?proposal_status=2" || true)
                PID=$(printf '%s' "${BODY}" | jq -r --arg n "${SEI_UPGRADE_NAME}" '
                  .proposals // []
                  | map(select(
                      (.content.plan.name? == $n)
                      or (.messages? // [] | map(.content.plan.name? // empty) | index($n))
                    ))
                  | .[0].proposal_id // empty
                ')
                if [ -n "${PID}" ] && [ "${PID}" != "null" ]; then
                  echo "resolved proposal_id=${PID} for upgrade=${SEI_UPGRADE_NAME}"
                  kubectl patch configmap "workflow-vars-major-upgrade-${SEI_WORKFLOW_RUN_ID}" \
                    --type=merge \
                    --patch "{\"data\":{\"PROPOSAL_ID\":\"${PID}\"}}"
                  exit 0
                fi
                echo "attempt=${i} no voting-period proposal matching ${SEI_UPGRADE_NAME} yet"
                sleep 2
              done
              echo "timed out resolving PROPOSAL_ID for upgrade=${SEI_UPGRADE_NAME}" >&2
              exit 1
          env:
            - name: SEI_UPGRADE_NAME
              value: "$SEI_UPGRADE_NAME"
            - name: SEI_WORKFLOW_RUN_ID
              value: "$SEI_WORKFLOW_RUN_ID"
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    # vote-yes-all-validators -- parallel, one CR per validator.
    - name: vote-yes-all-validators
      templateType: Parallel
      deadline: 10m
      children:
        - vote-node-0
        - vote-node-1
        - vote-node-2
        - vote-node-3

    - name: vote-node-0
      templateType: Task
      deadline: 8m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/gov-vote.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-0
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=PROPOSAL_ID=$(PROPOSAL_ID)
            - --var=OPTION=yes
            - --var=FEES=10000usei
            - --var=GAS=200000
            - --timeout=5m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: vote-node-1
      templateType: Task
      deadline: 8m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/gov-vote.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-1
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=PROPOSAL_ID=$(PROPOSAL_ID)
            - --var=OPTION=yes
            - --var=FEES=10000usei
            - --var=GAS=200000
            - --timeout=5m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: vote-node-2
      templateType: Task
      deadline: 8m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/gov-vote.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-2
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=PROPOSAL_ID=$(PROPOSAL_ID)
            - --var=OPTION=yes
            - --var=FEES=10000usei
            - --var=GAS=200000
            - --timeout=5m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: vote-node-3
      templateType: Task
      deadline: 8m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/gov-vote.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-3
            - --var=CHAIN_ID=$SEI_CHAIN_ID
            - --var=PROPOSAL_ID=$(PROPOSAL_ID)
            - --var=OPTION=yes
            - --var=FEES=10000usei
            - --var=GAS=200000
            - --timeout=5m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    # Polls REST gov endpoint until status=PROPOSAL_STATUS_PASSED.
    - name: wait-for-proposal-to-pass
      templateType: Task
      deadline: 10m
      task:
        container:
          name: wait-for-pass
          image: curlimages/curl:8.10.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              for i in $(seq 1 300); do
                STATUS=$(curl -fsS "${VALIDATOR_REST}/cosmos/gov/v1beta1/proposals/${PROPOSAL_ID}" \
                          | sed -n 's/.*"status":[[:space:]]*"\([A-Z_]*\)".*/\1/p' | head -1)
                echo "attempt=${i} proposal=${PROPOSAL_ID} status=${STATUS:-unknown}"
                [ "${STATUS}" = "PROPOSAL_STATUS_PASSED" ] && exit 0
                sleep 1
              done
              echo "proposal ${PROPOSAL_ID} did not pass within timeout" >&2
              exit 1
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    # Bumps the SeiNodeDeployment template image to the post-upgrade build in
    # a single patch. The SND controller (InPlace strategy) re-asserts the new
    # image onto every child SeiNode and drives each node's NodeUpdate plan;
    # the validators roll together onto the new binary at the upgrade height.
    #
    # Patches spec.template.spec.image only -- a strategic/merge patch leaves
    # the rest of the template untouched. Per-child UpdateNodeImage is NOT used
    # here: the SND controller would re-assert the template image every
    # reconcile, flip-flopping the child spec.image and churning the
    # StatefulSet so the rollout never settles (observe-image never completes).
    # The SND template is the single source of truth for child image.
    - name: bump-snd-image
      templateType: Task
      deadline: 5m
      task:
        container:
          name: bump-snd-image
          image: alpine/k8s:1.31.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              kubectl patch seinodedeployment "${SEI_CHAIN_ID}" \
                --type=merge \
                --patch "{\"spec\":{\"template\":{\"spec\":{\"image\":\"${SEI_POST_UPGRADE_IMG}\"}}}}"
              echo "patched seinodedeployment/${SEI_CHAIN_ID} template image to ${SEI_POST_UPGRADE_IMG}"
          env:
            - name: SEI_CHAIN_ID
              value: "$SEI_CHAIN_ID"
            - name: SEI_POST_UPGRADE_IMG
              value: "$SEI_POST_UPGRADE_IMG"

    # Liveness: each validator advances past TARGET_HEIGHT+10
    # (= POST_UPGRADE_HEIGHT) after the SND rolls all nodes onto the new
    # binary. AwaitCondition over the height predicate, one per validator.
    - name: await-post-upgrade-progress
      templateType: Parallel
      deadline: 15m
      children:
        - await-post-upgrade-progress-node-0
        - await-post-upgrade-progress-node-1
        - await-post-upgrade-progress-node-2
        - await-post-upgrade-progress-node-3

    - name: await-post-upgrade-progress-node-0
      templateType: Task
      deadline: 12m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/await-condition.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-0
            - --var=TARGET_HEIGHT=$(POST_UPGRADE_HEIGHT)
            - --timeout=10m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: await-post-upgrade-progress-node-1
      templateType: Task
      deadline: 12m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/await-condition.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-1
            - --var=TARGET_HEIGHT=$(POST_UPGRADE_HEIGHT)
            - --timeout=10m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: await-post-upgrade-progress-node-2
      templateType: Task
      deadline: 12m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/await-condition.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-2
            - --var=TARGET_HEIGHT=$(POST_UPGRADE_HEIGHT)
            - --timeout=10m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: await-post-upgrade-progress-node-3
      templateType: Task
      deadline: 12m
      task:
        container:
          name: runner
          image: $SEITASK_IMAGE
          args:
            - runner
            - --template=/templates/await-condition.yaml.tmpl
            - --var=NODE=$SEI_CHAIN_ID-3
            - --var=TARGET_HEIGHT=$(POST_UPGRADE_HEIGHT)
            - --timeout=10m
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: workflow-vars-major-upgrade-$SEI_WORKFLOW_RUN_ID

    - name: upload-report
      templateType: Task
      deadline: 5m
      task:
        container:
          name: seitask
          image: $SEITASK_IMAGE
          args:
            - upload-report
            - --bucket=harbor-validation-results
            - --prefix=nightly/major-upgrade/$SEI_WORKFLOW_RUN_ID
          env:
            - name: SEI_WORKFLOW_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['chaos-mesh.org/workflow']
            - name: SEI_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
