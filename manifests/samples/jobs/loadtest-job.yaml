# Load Test Job
#
# Runs sei-load against a SeiNodePool genesis network using EVM transfers.
# Requires the genesis network to be running (all nodes healthy).
#
# Endpoint pattern: <pool>-<ordinal>-0.<pool>-<ordinal>.<namespace>.svc.cluster.local:8545
apiVersion: v1
kind: ConfigMap
metadata:
  name: loadtest-config
  namespace: default
data:
  profile.json: |
    {
      "chainId": 713714,
      "seiChainId": "genesis-test-1",
      "endpoints": [
        "http://genesis-test-0-0.genesis-test-0.default.svc.cluster.local:8545",
        "http://genesis-test-1-0.genesis-test-1.default.svc.cluster.local:8545",
        "http://genesis-test-2-0.genesis-test-2.default.svc.cluster.local:8545",
        "http://genesis-test-3-0.genesis-test-3.default.svc.cluster.local:8545",
        "http://genesis-test-4-0.genesis-test-4.default.svc.cluster.local:8545",
        "http://genesis-test-5-0.genesis-test-5.default.svc.cluster.local:8545",
        "http://genesis-test-6-0.genesis-test-6.default.svc.cluster.local:8545",
        "http://genesis-test-7-0.genesis-test-7.default.svc.cluster.local:8545",
        "http://genesis-test-8-0.genesis-test-8.default.svc.cluster.local:8545",
        "http://genesis-test-9-0.genesis-test-9.default.svc.cluster.local:8545",
        "http://genesis-test-10-0.genesis-test-10.default.svc.cluster.local:8545",
        "http://genesis-test-11-0.genesis-test-11.default.svc.cluster.local:8545",
        "http://genesis-test-12-0.genesis-test-12.default.svc.cluster.local:8545",
        "http://genesis-test-13-0.genesis-test-13.default.svc.cluster.local:8545",
        "http://genesis-test-14-0.genesis-test-14.default.svc.cluster.local:8545",
        "http://genesis-test-15-0.genesis-test-15.default.svc.cluster.local:8545",
        "http://genesis-test-16-0.genesis-test-16.default.svc.cluster.local:8545",
        "http://genesis-test-17-0.genesis-test-17.default.svc.cluster.local:8545",
        "http://genesis-test-18-0.genesis-test-18.default.svc.cluster.local:8545",
        "http://genesis-test-19-0.genesis-test-19.default.svc.cluster.local:8545"
      ],
      "accounts": {
        "count": 50,
        "newAccountRate": 0.0
      },
      "scenarios": [
        { "name": "EVMTransfer", "weight": 1 }
      ],
      "settings": {
        "workers": 50,
        "tps": 10,
        "statsInterval": "5s",
        "bufferSize": 100,
        "trackBlocks": false,
        "prewarm": false,
        "rampUp": false
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: genesis-loadtest
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seiload
          image: ghcr.io/sei-protocol/sei-load:sha-7d4e0541dcafaf571adaa4ceb039b94b5620ef1f
          args:
            - --config
            - /etc/seiload/profile.json
          volumeMounts:
            - name: config
              mountPath: /etc/seiload
      volumes:
        - name: config
          configMap:
            name: loadtest-config
