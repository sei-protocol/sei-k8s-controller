# SeiNodeGroup — Genesis Ceremony (dev testnet)
#
# Three validator nodes that bootstrap a new chain from scratch via
# the genesis ceremony workflow. The group controller coordinates:
#   1. Each node generates identity + gentx, uploads artifacts to S3
#   2. Group assembles final genesis.json from all artifacts
#   3. Each node downloads genesis and starts the chain
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: genesis-test
  namespace: default
spec:
  replicas: 5

  genesis:
    chainId: genesis-test-1
    stakingAmount: "10000000usei"
    accountBalance: "1000000000000000000000usei,1000000000000000000000uusdc,1000000000000000000000uatom"

  template:
    metadata:
      labels:
        sei.io/role: validator
    spec:
      chainId: genesis-test-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/seictl@sha256:54325467253ad86cb486a97f5e9e57789e7c17c1faf844e730c89f175374bfe1

      validator: {}
