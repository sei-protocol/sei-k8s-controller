# SeiNodeGroup — Pacific-1 RPC Fleet
#
# Three full nodes behind a shared Service with Gateway API routing,
# Istio network isolation, and Prometheus monitoring. Each SeiNode
# bootstraps from an S3 snapshot and block-syncs to tip. Genesis is
# resolved automatically by the sidecar.
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: pacific-1-rpc
  namespace: default
spec:
  replicas: 3
  deletionPolicy: Delete

  template:
    metadata:
      labels:
        sei.io/role: rpc
    spec:
      chainId: pacific-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: ghcr.io/sei-protocol/seictl@sha256:594fcb6ec84266059bc7b0d3f0049450eaad9142ce0a9605e1d796a7b61e6391

      fullNode:
        peers:
          - ec2Tags:
              region: eu-central-1
              tags:
                ChainIdentifier: pacific-1
                Component: state-syncer
        snapshot:
          s3:
            targetHeight: 198740000
          trustPeriod: "9999h0m0s"

  networking:
    service:
      type: ClusterIP

    gateway:
      parentRef:
        name: sei-gateway
        namespace: istio-system
        sectionName: http
      hostnames:
        - rpc.pacific-1.sei.io
      annotations:
        external-dns.alpha.kubernetes.io/hostname: rpc.pacific-1.sei.io

    isolation:
      authorizationPolicy:
        allowedSources:
          - principals:
              - "cluster.local/ns/istio-system/sa/sei-gateway-istio"
          - namespaces:
              - default

  monitoring:
    serviceMonitor:
      interval: "30s"
      labels:
        release: prometheus
