# SeiNodeGroup — Fork Genesis Ceremony
#
# Forks an existing chain's state into a new private network.
# The group controller:
#   1. Creates a temporary exporter node that bootstraps from the source chain
#   2. Exports state at the specified height and uploads to S3
#   3. Tears down the exporter
#   4. Assembles fork genesis (rewrites chain ID, strips old validators, runs collect-gentxs)
#   5. Each validator downloads the fork genesis and starts the new chain
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: fork-test
  namespace: default
spec:
  replicas: 3

  genesis:
    chainId: fork-test-1
    stakingAmount: "10000000usei"
    accountBalance: "1000000000000000000000usei,1000000000000000000000uusdc,1000000000000000000000uatom"

    fork:
      sourceChainId: pacific-1
      sourceImage: "ghcr.io/bdchatham/sei-shadow@sha256:5dee59eaf2d0841a6e6c0f155bbafa5519a283295dd36e4271c6012f751afcd6"
      exportHeight: 200950000

  template:
    metadata:
      labels:
        sei.io/role: validator
    spec:
      chainId: fork-test-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: "ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf"

      peers:
        - ec2Tags:
            region: eu-central-1
            tags:
              ChainIdentifier: pacific-1
              Component: snapshotter

      validator: {}
