apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-snapshotter
  namespace: default
spec:
  chainId: pacific-1
  mode: archive
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:837ba922db3f5313a474fbe0c7bba4cbec466cdc

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:ad50d546c3aa4bfa220b3148ffc40b59d34d7c8d09522fa1ff25f635f2f1e710

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  config:
    overrides:
      # Match sei-infra production settings
      chain.concurrency_workers: "500"
      chain.occ_enabled: "true"
      self_remediation.blocks_behind_threshold: "300"
      self_remediation.blocks_behind_check_interval_seconds: "60"
      self_remediation.restart_cooldown_seconds: "300"
      self_remediation.p2p_no_peers_restart_window_seconds: "120"
      self_remediation.statesync_no_peers_restart_window_seconds: "90"

  genesis:
    chainId: pacific-1
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  peers:
    sources:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer

  stateSync:
    trustPeriod: "9999h0m0s"
    backfillBlocks: 0
    snapshot:
      bucket:
        uri: s3://pacific-1-snapshots/state-sync/
      region: eu-central-1

  storage:
    retainOnDelete: true

  snapshotGeneration:
    keepRecent: 5
    destination:
      s3:
        bucket: sei-node-mvp
        prefix: snapshot/
        region: eu-central-1
