apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-snapshotter
  namespace: default
spec:
  chainId: pacific-1
  mode: archive
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:837ba922db3f5313a474fbe0c7bba4cbec466cdc

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:80add5808602b0f9e92d6d7a8951ec8eb8bbcc9aaa8b2501bc1c4ea65adfa659

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  config:
    overrides:
      chain.concurrency_workers: "500"
      chain.occ_enabled: "true"
      self_remediation.blocks_behind_threshold: "0"

  genesis:
    chainId: pacific-1
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  peers:
    sources:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer

  storage:
    retainOnDelete: true

  snapshotGeneration:
    keepRecent: 5
    destination:
      s3:
        bucket: sei-node-mvp
        prefix: snapshot/
        region: eu-central-1
