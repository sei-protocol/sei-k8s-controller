# SeiNode — Pacific-1 State Syncer
#
# Full node that bootstraps via Tendermint state sync, produces snapshots,
# and uploads them to S3 for consumption by other nodes.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-state-syncer
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:8bfef078409c160f03c62fcd969702b3edc9d957369fb56dca9e34e09ac6c99a

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  storage:
    retainOnDelete: true

  fullNode:
    snapshot:
      stateSync: {}
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer
    snapshotGeneration:
      keepRecent: 5
      destination:
        s3:
          bucket: sei-node-mvp
          prefix: snapshot/
          region: eu-central-1
