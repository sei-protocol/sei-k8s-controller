apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sei-k8s-rbac-proxy
subjects:
  - kind: ServiceAccount
    name: <seinode-service-account>
    namespace: <seinode-namespace>
roleRef:
  kind: ClusterRole
  name: sei-k8s-rbac-proxy
  apiGroup: rbac.authorization.k8s.io
