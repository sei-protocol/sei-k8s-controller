# SeiNode — Pacific-1 Shadow Replayer
#
# Identical to pacific-1-replay except the entrypoint passes
# --skip-app-hash-validation so the node can block sync with a
# different execution engine (V2 vs Giga). The node is queryable
# via RPC for external comparison against the canonical chain.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-shadow-replayer
  namespace: default
spec:
  chainId: pacific-1
  image: ghcr.io/bdchatham/sei-shadow@sha256:e29af54effc908c3b998655f93713765ae476e40e39765530dc7a271648257ca

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:6314a5a05cf532841a181a4cd55c6d501db4c4c19bfe8173d887f8e435bc490c

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei", "--skip-app-hash-validation"]

  genesis:
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  overrides:
    giga_executor.enabled: "true"
    giga_executor.occ_enabled: "true"

  storage:
    retainOnDelete: true

  replayer:
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer
    snapshot:
      s3:
        targetHeight: 198740000
      bootstrapImage: "ghcr.io/sei-protocol/sei:v6.3.0"
      trustPeriod: "9999h0m0s"
    resultExport: {}
