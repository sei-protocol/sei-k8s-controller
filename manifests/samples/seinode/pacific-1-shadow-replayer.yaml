# SeiNode — Pacific-1 Shadow Replayer
#
# Replays the canonical pacific-1 chain with a different execution engine
# (Giga) via --skip-app-hash-validation. The sidecar continuously compares
# block results against the canonical RPC and completes when app-hash
# divergence is detected, uploading a DivergenceReport to S3.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-shadow-replayer
  namespace: default
spec:
  chainId: pacific-1
  image: ghcr.io/bdchatham/sei-shadow@sha256:5dee59eaf2d0841a6e6c0f155bbafa5519a283295dd36e4271c6012f751afcd6

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:594fcb6ec84266059bc7b0d3f0049450eaad9142ce0a9605e1d796a7b61e6391

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei", "--skip-app-hash-validation"]

  overrides:
    giga_executor.enabled: "true"
    giga_executor.occ_enabled: "true"

  replayer:
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer
    snapshot:
      s3:
        targetHeight: 200400000
      bootstrapImage: "ghcr.io/sei-protocol/sei:v6.3.0"
      trustPeriod: "9999h0m0s"
    resultExport:
      canonicalRpc: "http://pacific-1-canonical-rpc.default.svc.cluster.local:26657"
