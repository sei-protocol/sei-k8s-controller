# SeiNode — Pacific-1 State Syncer
#
# Full node that bootstraps via Tendermint state sync, produces snapshots,
# and uploads them to S3 for consumption by other nodes.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-state-syncer
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:22639286ad0898fdeced42b850a8b07fa0f9267401c62b993df1cc0f1ddaca9a

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  storage:
    retainOnDelete: true

  peers:
    - ec2Tags:
        region: eu-central-1
        tags:
          ChainIdentifier: pacific-1
          Component: state-syncer

  fullNode:
    snapshot:
      stateSync: {}
    snapshotGeneration:
      keepRecent: 5
