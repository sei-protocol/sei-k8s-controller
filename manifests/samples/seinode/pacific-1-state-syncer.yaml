# SeiNode — Pacific-1 State Syncer
#
# Full node that bootstraps via Tendermint state sync, produces snapshots,
# and uploads them to S3 for consumption by other nodes.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-state-syncer
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  storage:
    retainOnDelete: true

  peers:
    - ec2Tags:
        region: eu-central-1
        tags:
          ChainIdentifier: pacific-1
          Component: state-syncer

  fullNode:
    snapshot:
      stateSync: {}
    snapshotGeneration:
      keepRecent: 5
