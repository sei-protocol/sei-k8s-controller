# SeiNode — Pacific-1 Full Node
#
# A chain-following full node that bootstraps from an S3 snapshot via
# a bootstrap Job, then block-syncs to tip. Genesis is resolved
# automatically by the sidecar (pacific-1 is embedded in sei-config).
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-full-node
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:63860a7cf1810e70cc8647d72ff705f87a203250b12bbdec2f88f26b850b628e

  fullNode:
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer
    snapshot:
      s3:
        targetHeight: 198740000
      trustPeriod: "9999h0m0s"
