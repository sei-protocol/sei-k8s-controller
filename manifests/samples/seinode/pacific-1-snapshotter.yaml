# SeiNode — Pacific-1 Archive + Snapshotter
#
# Archive node for pacific-1 that bootstraps via Tendermint state sync,
# discovers peers, produces Tendermint snapshots, and uploads them to S3.
# Genesis is resolved automatically by the sidecar.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-snapshotter
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:63860a7cf1810e70cc8647d72ff705f87a203250b12bbdec2f88f26b850b628e

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  archive:
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer

    snapshotGeneration:
      keepRecent: 5
      destination:
        s3:
          bucket: sei-node-mvp
          prefix: snapshot/
          region: eu-central-1
