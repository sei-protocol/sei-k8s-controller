# SeiNode — Pacific-1 Replayer
#
# Replays the pacific-1 chain from a snapshot restore point. Downloads
# genesis.json from S3 and replays from the snapshot height.
#
# Typical deployment: chain verification, shadow replay, archival re-indexing.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-replayer
  namespace: default
spec:
  chainId: pacific-1
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:6a57c4d27e472d2072193e9abcbab33c14a0fdbd

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    chainId: pacific-1
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  storage:
    retainOnDelete: true

  replayer:
    snapshot:
      region: eu-central-1
      bucket:
        uri: s3://pacific-1-snapshots/state-sync/
    peers:
      sources:
        - ec2Tags:
            region: eu-central-1
            tags:
              ChainIdentifier: pacific-1
