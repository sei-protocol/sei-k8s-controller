# SeiNode — Archive + Snapshotter
#
# Runs an archive node that produces Tendermint state-sync snapshots and uploads
# them to S3.  The sidecar handles genesis download, peer discovery, config
# patching for archival pruning, and periodic snapshot uploads.
#
# Typical deployment: one per chain / region to keep a fresh snapshot archive
# that other nodes can restore from.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: atlantic-2-snapshotter
  namespace: default
spec:
  chainId: atlantic-2
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:latest

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    chainId: atlantic-2
    s3:
      uri: s3://sei-testnet-genesis-config/atlantic-2/genesis.json
      region: us-east-2

  storage:
    retainOnDelete: true

  archive:
    peers:
      sources:
        - ec2Tags:
            region: eu-central-1
            tags:
              ChainIdentifier: atlantic-2
              Component: snapshotter

    snapshotGeneration:
      keepRecent: 5
      destination:
        s3:
          bucket: atlantic-2-snapshots
          prefix: state-sync/
          region: eu-central-1
