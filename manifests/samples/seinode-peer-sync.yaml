# SeiNode — Full Node (Block Sync from S3 Snapshot)
#
# Bootstraps a full node by restoring from an S3 snapshot, then discovers
# peers to catch up to the chain tip.  No snapshot generation — this node is a
# consumer of snapshots produced by a snapshotter node.
#
# Typical deployment: validator sentries, RPC nodes, or any node joining an
# existing chain without replaying from genesis.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: atlantic-2-fullnode
  namespace: default
spec:
  chainId: atlantic-2
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:latest

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    chainId: atlantic-2
    s3:
      uri: s3://sei-testnet-genesis-config/atlantic-2/genesis.json
      region: us-east-2

  sidecar:
    image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei-sidecar:latest

  fullNode:
    sync:
      peers:
        sources:
          - ec2Tags:
              region: eu-central-1
              tags:
                ChainIdentifier: atlantic-2
      blockSync:
        snapshot:
          region: eu-central-1
          bucket:
            uri: s3://atlantic-2-snapshots/state-sync/
          trustPeriod: "9999h0m0s"
