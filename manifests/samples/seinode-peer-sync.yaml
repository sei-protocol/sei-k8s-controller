# SeiNode — Replay (S3 Snapshot Bootstrap)
#
# Bootstraps a replay node by restoring from an S3 snapshot. The controller
# derives state-sync parameters (useLocalSnapshot, trustPeriod) automatically
# from the presence of snapshotRestore.
#
# Typical deployment: ephemeral replay nodes for shadow testing or historical
# block re-execution.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: atlantic-2-replay
  namespace: default
spec:
  chainId: atlantic-2
  mode: replay
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:latest

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    chainId: atlantic-2
    s3:
      uri: s3://sei-testnet-genesis-config/atlantic-2/genesis.json
      region: us-east-2

  # Restore from an S3 snapshot. The controller will automatically configure
  # state-sync with useLocalSnapshot=true and trustPeriod="9999h0m0s".
  snapshotRestore:
    region: eu-central-1
    bucket:
      uri: s3://atlantic-2-snapshots/state-sync/

  # Discover peers from multiple sources.
  peers:
    sources:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: atlantic-2

  sidecar:
    image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei-sidecar:latest
