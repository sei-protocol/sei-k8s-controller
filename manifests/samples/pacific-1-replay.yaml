# SeiNode — Pacific-1 Replay
#
# Bootstraps from an S3 snapshot and replays from that height.
# The controller configures local-snapshot mode automatically
# (use-local-snapshot, trust-period=9999h, backfill-blocks=0).
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-replay
  namespace: default
spec:
  chainId: pacific-1
  mode: replay
  image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-chain:837ba922db3f5313a474fbe0c7bba4cbec466cdc

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:80add5808602b0f9e92d6d7a8951ec8eb8bbcc9aaa8b2501bc1c4ea65adfa659

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  genesis:
    chainId: pacific-1
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  snapshotRestore:
    region: eu-central-1
    bucket:
      uri: s3://pacific-1-snapshots/state-sync/

  peers:
    sources:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer

  storage:
    retainOnDelete: true
