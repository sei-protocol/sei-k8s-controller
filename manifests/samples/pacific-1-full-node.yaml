# SeiNode — Pacific-1 Full Node
#
# A chain-following full node that bootstraps from an S3 snapshot via
# a PreInit Job, then block-syncs to tip. Exposes RPC for queries.
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: pacific-1-full-node
  namespace: default
spec:
  chainId: pacific-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:8bfef078409c160f03c62fcd969702b3edc9d957369fb56dca9e34e09ac6c99a

  genesis:
    s3:
      uri: s3://sei-testnet-genesis-config/pacific-1/genesis.json
      region: us-east-2

  storage:
    retainOnDelete: true

  fullNode:
    peers:
      - ec2Tags:
          region: eu-central-1
          tags:
            ChainIdentifier: pacific-1
            Component: state-syncer
    snapshot:
      s3:
        targetHeight: 198740000
      trustPeriod: "9999h0m0s"
