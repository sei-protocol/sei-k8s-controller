# SeiNodeDeployment — Pacific-1 RPC Fleet
#
# Three full nodes behind a shared Service with Gateway API routing,
# Istio network isolation, and Prometheus monitoring. Each SeiNode
# bootstraps from an S3 snapshot and block-syncs to tip. Genesis is
# resolved automatically by the sidecar.
apiVersion: sei.io/v1alpha1
kind: SeiNodeDeployment
metadata:
  name: pacific-1-rpc
  namespace: default
spec:
  replicas: 3
  deletionPolicy: Delete

  template:
    metadata:
      labels:
        sei.io/role: rpc
    spec:
      chainId: pacific-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

      peers:
        - ec2Tags:
            region: eu-central-1
            tags:
              ChainIdentifier: pacific-1
              Component: state-syncer

      fullNode:
        snapshot:
          s3:
            targetHeight: 198740000
          trustPeriod: "9999h0m0s"

  networking:
    service:
      type: ClusterIP

    isolation:
      authorizationPolicy:
        allowedSources:
          - principals:
              - "cluster.local/ns/istio-system/sa/sei-gateway-istio"
          - namespaces:
              - default

  monitoring:
    serviceMonitor:
      interval: "30s"
      labels:
        release: prometheus
