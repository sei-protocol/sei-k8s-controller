---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: seinodes.sei.io
spec:
  group: sei.io
  names:
    kind: SeiNode
    listKind: SeiNodeList
    plural: seinodes
    shortNames:
    - snode
    singular: seinode
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SeiNode is the Schema for the seinodes API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SeiNodeSpec defines the desired state of a standalone Sei node.
              Exactly one mode sub-spec (fullNode, archive, replayer, validator) must be set;
              the populated field determines the node's operating mode.
            properties:
              archive:
                description: Archive configures an archive node with full history
                  and no pruning.
                properties:
                  snapshotGeneration:
                    description: SnapshotGeneration configures periodic snapshot creation
                      and optional upload.
                    properties:
                      tendermint:
                        description: Tendermint configures Tendermint state-sync snapshot
                          generation.
                        properties:
                          keepRecent:
                            description: |-
                              KeepRecent is the number of recent snapshots to retain on disk.
                              When Publish is set, must be at least 2 so the upload algorithm can
                              select the second-to-latest completed snapshot. Otherwise must be at
                              least 1.
                            format: int32
                            minimum: 1
                            type: integer
                          publish:
                            description: |-
                              Publish, when set, causes the sidecar to upload completed snapshots
                              to {SEI_SNAPSHOT_BUCKET}/{chainID}/. Absence means snapshots are kept
                              on disk only and are not uploaded.
                            type: object
                        required:
                        - keepRecent
                        type: object
                    type: object
                type: object
              chainId:
                description: ChainID of the chain this node belongs to.
                minLength: 1
                type: string
              entrypoint:
                description: Entrypoint overrides the image command for the running
                  node process.
                properties:
                  args:
                    items:
                      type: string
                    maxItems: 64
                    type: array
                  command:
                    items:
                      type: string
                    maxItems: 16
                    minItems: 1
                    type: array
                required:
                - command
                type: object
              fullNode:
                description: FullNode configures a chain-following full node (absorbs
                  the "rpc" role).
                properties:
                  snapshot:
                    description: |-
                      Snapshot configures how the node obtains its initial chain state.
                      When absent the node block-syncs from genesis.
                    properties:
                      backfillBlocks:
                        description: |-
                          BackfillBlocks is the number of historical blocks to fetch from peers
                          after snapshot restore.
                        format: int64
                        type: integer
                      bootstrapImage:
                        description: |-
                          BootstrapImage is a seid container image used for the bootstrap Job.
                          When set, the controller runs a one-shot Job with this image and the
                          seictl sidecar to prepare the node's data PVC before the main StatefulSet
                          starts. The Job restores a snapshot, applies config, and syncs to the
                          target height.
                        type: string
                      s3:
                        description: S3 downloads a snapshot archive from an S3 bucket.
                        properties:
                          targetHeight:
                            description: TargetHeight is the block height the node
                              should sync to after restoring.
                            format: int64
                            minimum: 1
                            type: integer
                        required:
                        - targetHeight
                        type: object
                      stateSync:
                        description: StateSync fetches snapshot chunks from peers
                          via Tendermint state sync.
                        type: object
                      trustPeriod:
                        description: |-
                          TrustPeriod is the window during which the snapshot's block validators
                          are considered trustworthy. Must be long enough to cover the age of
                          the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of s3 or stateSync must be set
                      rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync) ? 1 : 0)
                        == 1'
                  snapshotGeneration:
                    description: |-
                      SnapshotGeneration configures periodic snapshot creation and optional upload.
                      When set, the controller disables pruning and enables snapshot intervals.
                    properties:
                      tendermint:
                        description: Tendermint configures Tendermint state-sync snapshot
                          generation.
                        properties:
                          keepRecent:
                            description: |-
                              KeepRecent is the number of recent snapshots to retain on disk.
                              When Publish is set, must be at least 2 so the upload algorithm can
                              select the second-to-latest completed snapshot. Otherwise must be at
                              least 1.
                            format: int32
                            minimum: 1
                            type: integer
                          publish:
                            description: |-
                              Publish, when set, causes the sidecar to upload completed snapshots
                              to {SEI_SNAPSHOT_BUCKET}/{chainID}/. Absence means snapshots are kept
                              on disk only and are not uploaded.
                            type: object
                        required:
                        - keepRecent
                        type: object
                    type: object
                type: object
              image:
                description: Image is the seid container image.
                maxLength: 512
                minLength: 1
                type: string
              overrides:
                additionalProperties:
                  type: string
                description: |-
                  Overrides is a flat map of dotted TOML key paths to string values.
                  Keys use the sei-config unified schema (e.g. "evm.http_port", "storage.pruning").
                  These are applied on top of mode defaults during config-apply.
                type: object
              peers:
                description: |-
                  Peers configures how this node discovers and connects to network peers.
                  Applies to all node modes. Required for replayer nodes.
                items:
                  description: PeerSource is a union type — exactly one field must
                    be set.
                  properties:
                    ec2Tags:
                      description: |-
                        EC2Tags discovers peers by querying EC2 for running instances
                        matching the specified tags.
                      properties:
                        region:
                          description: Region is the AWS region to query for EC2 instances.
                          minLength: 1
                          type: string
                        tags:
                          additionalProperties:
                            type: string
                          description: Tags are the EC2 instance tags to filter on.
                          minProperties: 1
                          type: object
                      required:
                      - region
                      - tags
                      type: object
                    label:
                      description: |-
                        Label discovers peers by selecting SeiNode resources via
                        Kubernetes labels. The controller resolves matching nodes to
                        stable headless Service DNS names and tracks them in
                        status.resolvedPeers. The sidecar queries each for its
                        Tendermint node ID at task execution time.
                      properties:
                        namespace:
                          description: |-
                            Namespace restricts discovery to a specific namespace.
                            When empty, defaults to the namespace of the discovering node.
                          type: string
                        selector:
                          additionalProperties:
                            type: string
                          description: |-
                            Selector is a set of key-value label pairs. SeiNode resources
                            matching ALL labels are included as peers.
                          minProperties: 1
                          type: object
                      required:
                      - selector
                      type: object
                    static:
                      description: Static provides a fixed list of peer addresses.
                      properties:
                        addresses:
                          description: Addresses is a list of peer addresses in "nodeId@host:port"
                            format.
                          items:
                            type: string
                          minItems: 1
                          type: array
                      required:
                      - addresses
                      type: object
                  type: object
                  x-kubernetes-validations:
                  - message: exactly one of ec2Tags, static, or label must be set
                    rule: '(has(self.ec2Tags) ? 1 : 0) + (has(self.static) ? 1 : 0)
                      + (has(self.label) ? 1 : 0) == 1'
                type: array
              podLabels:
                additionalProperties:
                  type: string
                description: |-
                  PodLabels are additional labels merged into the StatefulSet pod template.
                  The controller always sets sei.io/node; these are additive and applied
                  first so that system labels take precedence.
                  Must be set before the StatefulSet is first created; changes after
                  creation require StatefulSet recreation due to selector immutability.
                type: object
              replayer:
                description: Replayer configures an ephemeral replay workload that
                  restores from a snapshot.
                properties:
                  resultExport:
                    description: |-
                      ResultExport configures periodic export of block execution results to S3.
                      The sidecar queries the local RPC for block_results and uploads compressed
                      NDJSON pages on a schedule. Useful for shadow replayers that need their
                      execution results compared against the canonical chain.
                    properties:
                      canonicalRpc:
                        description: |-
                          CanonicalRPC is the HTTP RPC endpoint of the canonical chain node
                          to compare block execution results against. When set, the sidecar
                          runs in comparison mode and the task completes when app-hash
                          divergence is detected.
                        minLength: 1
                        type: string
                    required:
                    - canonicalRpc
                    type: object
                  snapshot:
                    description: Snapshot identifies the snapshot to restore from
                      before replay begins.
                    properties:
                      backfillBlocks:
                        description: |-
                          BackfillBlocks is the number of historical blocks to fetch from peers
                          after snapshot restore.
                        format: int64
                        type: integer
                      bootstrapImage:
                        description: |-
                          BootstrapImage is a seid container image used for the bootstrap Job.
                          When set, the controller runs a one-shot Job with this image and the
                          seictl sidecar to prepare the node's data PVC before the main StatefulSet
                          starts. The Job restores a snapshot, applies config, and syncs to the
                          target height.
                        type: string
                      s3:
                        description: S3 downloads a snapshot archive from an S3 bucket.
                        properties:
                          targetHeight:
                            description: TargetHeight is the block height the node
                              should sync to after restoring.
                            format: int64
                            minimum: 1
                            type: integer
                        required:
                        - targetHeight
                        type: object
                      stateSync:
                        description: StateSync fetches snapshot chunks from peers
                          via Tendermint state sync.
                        type: object
                      trustPeriod:
                        description: |-
                          TrustPeriod is the window during which the snapshot's block validators
                          are considered trustworthy. Must be long enough to cover the age of
                          the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of s3 or stateSync must be set
                      rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync) ? 1 : 0)
                        == 1'
                required:
                - snapshot
                type: object
              sidecar:
                description: Sidecar configures the sei-sidecar container.
                properties:
                  image:
                    description: Image overrides the sidecar container image.
                    type: string
                  port:
                    default: 7777
                    description: Port is the HTTP port the sidecar listens on.
                    format: int32
                    type: integer
                  resources:
                    description: Resources defines CPU/memory requests and limits
                      for the sidecar container.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This field depends on the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                type: object
              validator:
                description: Validator configures a consensus-participating validator
                  node.
                properties:
                  genesisCeremony:
                    description: |-
                      GenesisCeremony indicates this validator participates in a group genesis
                      ceremony. Set by the SeiNodeDeployment controller — not intended for direct use.
                    properties:
                      accountBalance:
                        description: |-
                          AccountBalance is the initial coin balance to fund this validator's
                          genesis account. The node's own address is discovered during identity
                          generation — no cross-node coordination needed.
                        minLength: 1
                        type: string
                      chainId:
                        description: ChainID of the genesis network.
                        minLength: 1
                        type: string
                      genesisParams:
                        description: |-
                          GenesisParams is a JSON string of genesis parameter overrides merged
                          on top of sei-config's GenesisDefaults(). Applied before gentx generation.
                        type: string
                      index:
                        description: Index is the node's ordinal within the group
                          (0-based).
                        format: int32
                        minimum: 0
                        type: integer
                      stakingAmount:
                        description: StakingAmount is the self-delegation amount for
                          this validator's gentx.
                        minLength: 1
                        type: string
                    required:
                    - accountBalance
                    - chainId
                    - index
                    - stakingAmount
                    type: object
                  snapshot:
                    description: |-
                      Snapshot configures how the node obtains its initial chain state.
                      When absent the node block-syncs from genesis.
                    properties:
                      backfillBlocks:
                        description: |-
                          BackfillBlocks is the number of historical blocks to fetch from peers
                          after snapshot restore.
                        format: int64
                        type: integer
                      bootstrapImage:
                        description: |-
                          BootstrapImage is a seid container image used for the bootstrap Job.
                          When set, the controller runs a one-shot Job with this image and the
                          seictl sidecar to prepare the node's data PVC before the main StatefulSet
                          starts. The Job restores a snapshot, applies config, and syncs to the
                          target height.
                        type: string
                      s3:
                        description: S3 downloads a snapshot archive from an S3 bucket.
                        properties:
                          targetHeight:
                            description: TargetHeight is the block height the node
                              should sync to after restoring.
                            format: int64
                            minimum: 1
                            type: integer
                        required:
                        - targetHeight
                        type: object
                      stateSync:
                        description: StateSync fetches snapshot chunks from peers
                          via Tendermint state sync.
                        type: object
                      trustPeriod:
                        description: |-
                          TrustPeriod is the window during which the snapshot's block validators
                          are considered trustworthy. Must be long enough to cover the age of
                          the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: exactly one of s3 or stateSync must be set
                      rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync) ? 1 : 0)
                        == 1'
                type: object
            required:
            - chainId
            - image
            type: object
            x-kubernetes-validations:
            - message: exactly one of fullNode, archive, replayer, or validator must
                be set
              rule: '(has(self.fullNode) ? 1 : 0) + (has(self.archive) ? 1 : 0) +
                (has(self.replayer) ? 1 : 0) + (has(self.validator) ? 1 : 0) == 1'
            - message: peers is required when replayer mode is set
              rule: '!has(self.replayer) || (has(self.peers) && size(self.peers) >
                0)'
          status:
            description: SeiNodeStatus defines the observed state of a SeiNode.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentImage:
                description: |-
                  CurrentImage is the seid container image observed running on the
                  owned StatefulSet. Updated by the SeiNode controller when the
                  StatefulSet rollout completes (currentRevision == updateRevision).
                  Parent controllers compare this against spec.image to determine
                  whether a spec change has been fully actuated.
                type: string
              externalAddress:
                description: |-
                  ExternalAddress is the routable P2P address (host:port) for this node,
                  populated by the SeiNodeDeployment controller from the LoadBalancer
                  ingress. Used by the planner to set p2p.external_address in CometBFT
                  config so the node advertises a reachable address for gossip discovery.
                type: string
              phase:
                description: Phase is the high-level lifecycle state.
                enum:
                - Pending
                - Initializing
                - Running
                - Failed
                - Terminating
                type: string
              phaseTransitionTime:
                description: |-
                  PhaseTransitionTime is when the node last changed phases.
                  Used to compute phase duration metrics.
                format: date-time
                type: string
              plan:
                description: |-
                  Plan tracks the active task sequence for this node. A planner generates
                  the plan based on the node's current state and conditions.
                properties:
                  failedPhase:
                    description: |-
                      FailedPhase is the SeiNodePhase the executor sets on the owning
                      resource when the plan fails terminally. When empty, the executor
                      does not perform a phase transition on failure.
                    enum:
                    - Pending
                    - Initializing
                    - Running
                    - Failed
                    - Terminating
                    type: string
                  failedTaskDetail:
                    description: FailedTaskDetail records diagnostics about the task
                      that caused the plan to fail.
                    properties:
                      error:
                        description: Error is the error message from the failed execution.
                        type: string
                      id:
                        description: ID is the task ID that failed.
                        type: string
                      maxRetries:
                        description: MaxRetries is the configured retry limit.
                        type: integer
                      retryCount:
                        description: RetryCount is the number of retries that were
                          attempted.
                        type: integer
                      type:
                        description: Type is the task type that failed.
                        type: string
                    required:
                    - error
                    - id
                    - maxRetries
                    - retryCount
                    - type
                    type: object
                  failedTaskIndex:
                    description: FailedTaskIndex is the index of the task that caused
                      the plan to fail.
                    type: integer
                  id:
                    description: ID is a unique identifier for this plan instance.
                    type: string
                  phase:
                    description: Phase is the overall state of the plan.
                    enum:
                    - Active
                    - Complete
                    - Failed
                    type: string
                  targetPhase:
                    description: |-
                      TargetPhase is the SeiNodePhase the executor sets on the owning
                      resource when the plan completes successfully. When empty, the
                      executor does not perform a phase transition.
                    enum:
                    - Pending
                    - Initializing
                    - Running
                    - Failed
                    - Terminating
                    type: string
                  tasks:
                    description: Tasks is the ordered list of tasks to execute.
                    items:
                      description: |-
                        PlannedTask is a single task within a TaskPlan. Each task carries its full
                        payload so the plan executor can deserialize and run it without needing
                        access to the planner or sidecar client factory.
                      properties:
                        error:
                          description: Error is the error message if the task failed.
                          type: string
                        id:
                          description: |-
                            ID is a deterministic UUID v5 derived from planID/taskType/planIndex.
                            Used as the key for sidecar task submission and status polling.
                          type: string
                        maxRetries:
                          description: |-
                            MaxRetries is the maximum number of times this task can be retried after
                            failure. When 0 (default), failures are terminal. Used for tasks like
                            configure-genesis that may need to wait for upstream data to appear.
                          type: integer
                        params:
                          description: |-
                            Params is the opaque JSON payload for this task. Deserialized at
                            execution time by task.Deserialize into the concrete task type.
                          x-kubernetes-preserve-unknown-fields: true
                        retryCount:
                          description: RetryCount is the current retry attempt number.
                          type: integer
                        status:
                          description: Status is the current state of this task.
                          enum:
                          - Pending
                          - Complete
                          - Failed
                          type: string
                        submittedAt:
                          description: |-
                            SubmittedAt is when the task was first submitted to the sidecar.
                            Nil means the task has not been submitted yet.
                          format: date-time
                          type: string
                        type:
                          description: Type identifies the task (e.g. "snapshot-restore",
                            "config-patch").
                          type: string
                      required:
                      - id
                      - status
                      - type
                      type: object
                    type: array
                required:
                - phase
                - tasks
                type: object
              resolvedPeers:
                description: |-
                  ResolvedPeers is the current set of peer DNS hostnames discovered
                  from label-based peer sources. Reconciled continuously so that
                  future peer-update plans can detect drift.
                items:
                  type: string
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
