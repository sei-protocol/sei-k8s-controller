                        properties:
                          snapshotGeneration:
                            description: SnapshotGeneration configures periodic snapshot
                              creation and optional upload.
                            properties:
                              keepRecent:
                                description: |-
                                  KeepRecent is the number of recent snapshots to retain on disk.
                                  Must be at least 2 so the upload algorithm can select the
                                  second-to-latest completed snapshot.
                                format: int32
                                minimum: 2
                                type: integer
                            required:
                            - keepRecent
                            type: object
                        type: object
                      chainId:
