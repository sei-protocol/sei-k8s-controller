                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: Annotations are merged onto each child SeiNode's
                          metadata.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: Labels are merged onto each child SeiNode's metadata.
                        type: object
                    type: object
                  spec:
                    description: Spec is the SeiNodeSpec applied to each replica.
                    properties:
                      archive:
                        description: Archive configures an archive node with full
