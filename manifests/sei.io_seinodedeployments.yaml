apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: seinodedeployments.sei.io
spec:
  group: sei.io
  names:
    kind: SeiNodeDeployment
    listKind: SeiNodeDeploymentList
    plural: seinodedeployments
    shortNames:
    - snd
    singular: seinodedeployment
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.rollout.entrantRevision
      name: Revision
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SeiNodeDeployment is the Schema for the seinodedeployments API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SeiNodeDeploymentSpec defines the desired state of a SeiNodeDeployment.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy controls what happens to child SeiNodes and managed
                  networking/monitoring resources when the SeiNodeDeployment is deleted.
                  "Delete" (default) cascades deletion. "Retain" orphans children
                  and networking resources so they continue running independently.
                enum:
                - Delete
                - Retain
                type: string
              genesis:
                description: |-
                  Genesis configures genesis ceremony orchestration for this group.
                  When set, the controller generates GenesisCeremonyNodeConfig for each
                  child SeiNode and coordinates assembly of the final genesis.json.
                properties:
                  accountBalance:
                    default: 1000000000000000000000usei,1000000000000000000000uusdc,1000000000000000000000uatom
                    description: AccountBalance is the initial balance for each validator's
                      genesis account.
                    type: string
                  accounts:
                    description: Accounts adds non-validator genesis accounts (e.g.
                      for load test funding).
                    items:
                      description: GenesisAccount represents a non-validator genesis
                        account to fund.
                      properties:
                        address:
                          description: Address is the bech32-encoded account address.
                          minLength: 1
                          type: string
                        balance:
                          description: Balance is the initial balance in coin notation
                            (e.g. "1000000usei").
                          minLength: 1
                          type: string
                      required:
                      - address
                      - balance
                      type: object
                    type: array
                  chainId:
                    description: ChainID for the new network.
                    maxLength: 64
                    minLength: 1
                    pattern: ^[a-z0-9][a-z0-9-]*[a-z0-9]$
                    type: string
                  fork:
                    description: |-
                      Fork configures this genesis ceremony to fork from an existing
                      chain's exported state rather than building genesis from scratch.
                      When set, the assembler downloads the exported state, rewrites
                      the chain identity, strips old validators, and runs collect-gentxs
                      with the new validator set.
                    properties:
                      exportHeight:
                        description: |-
                          ExportHeight is the block height at which to export state.
                          seid export --height N reads committed state at exactly this height.
                        format: int64
                        minimum: 1
                        type: integer
                      sourceChainId:
                        description: SourceChainID is the chain ID of the network
                          being forked.
                        minLength: 1
                        type: string
                      sourceImage:
                        description: |-
                          SourceImage is the seid container image compatible with the source
                          chain at ExportHeight. Used as both the bootstrap and main image
                          for the temporary exporter node.
                        minLength: 1
                        type: string
                    required:
                    - exportHeight
                    - sourceChainId
                    - sourceImage
                    type: object
                  maxCeremonyDuration:
                    description: |-
                      MaxCeremonyDuration is the maximum time from group creation to genesis
                      assembly completion. Default: "15m".
                    type: string
                  overrides:
                    additionalProperties:
                      type: string
                    description: |-
                      Overrides is a flat map of dotted key paths merged on top of sei-config's
                      GenesisDefaults(). Applied BEFORE gentx generation.
                    type: object
                  stakingAmount:
                    default: 10000000usei
                    description: StakingAmount is the amount each validator self-delegates
                      in its gentx.
                    type: string
                required:
                - chainId
                type: object
              monitoring:
                description: |-
                  Monitoring configures observability resources shared across
                  all replicas.
                properties:
                  serviceMonitor:
                    description: |-
                      ServiceMonitor creates a monitoring.coreos.com/v1 ServiceMonitor.
                      Presence (non-nil) enables it; set to nil to disable.
                    properties:
                      interval:
                        default: 30s
                        description: Interval is the Prometheus scrape interval.
                        pattern: ^[0-9]+(ms|s|m|h)$
                        type: string
                      labels:
                        additionalProperties:
                          type: string
                        description: Labels are added to the ServiceMonitor metadata.
                        type: object
                    type: object
                type: object
              networking:
                description: |-
                  Networking enables public networking for the deployment.
                  When present, the controller creates a ClusterIP Service and
                  HTTPRoutes on the platform Gateway. When absent, the deployment
                  is private with only per-node headless Services.
                type: object
              replicas:
                default: 1
                description: Replicas is the number of SeiNode instances to create.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              template:
                description: |-
                  Template defines the SeiNode spec stamped out for each replica.
