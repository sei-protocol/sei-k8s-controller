                        format: int64
                        minimum: 1
                        type: integer
                    required:
                    - haltHeight
                    type: object
                  type:
                    description: Type selects the deployment strategy.
                    enum:
                    - InPlace
                    - BlueGreen
                    - HardFork
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
