                                type: object
                              trustPeriod:
                                description: |-
                                  TrustPeriod is the window during which the snapshot's block validators
                                  are considered trustworthy. Must be long enough to cover the age of
                                  the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                                type: string
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one of s3 or stateSync must be set
                              rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync)
                                ? 1 : 0) == 1'
                        required:
                        - snapshot
                        type: object
                      sidecar:
                        description: Sidecar configures the sei-sidecar container.
                        properties:
                          image:
                            description: Image overrides the sidecar container image.
                            type: string
                          port:
                            default: 7777
                            description: Port is the HTTP port the sidecar listens
                              on.
                            format: int32
                            type: integer
                          resources:
                            description: Resources defines CPU/memory requests and
                              limits for the sidecar container.
                            properties:
                              claims:
                                description: |-
                                  Claims lists the names of resources, defined in spec.resourceClaims,
                                  that are used by this container.

                                  This field depends on the
                                  DynamicResourceAllocation feature gate.

                                  This field is immutable. It can only be set for containers.
                                items:
                                  description: ResourceClaim references one entry
                                    in PodSpec.ResourceClaims.
                                  properties:
                                    name:
                                      description: |-
                                        Name must match the name of one entry in pod.spec.resourceClaims of
                                        the Pod where this field is used. It makes that resource available
                                        inside a container.
                                      type: string
                                    request:
                                      description: |-
                                        Request is the name chosen for a request in the referenced claim.
                                        If empty, everything from the claim is made available, otherwise
                                        only the result of this request.
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                                x-kubernetes-list-map-keys:
