# sei-validator-task-submitter is the standard ClusterRole that operators
# bind to identities (controller SA, operator humans, fleet automation)
# that should be permitted to submit tasks to a SeiNode's sidecar.
#
# The "seinodetasks" resource is virtual — there is no CRD by that name.
# kube-rbac-proxy constructs a SubjectAccessReview with this resource on
# each authenticated request; this ClusterRole is what bindings reference.
#
# resourceNames is left empty: bindings get unrestricted access across all
# SeiNodes by default. Operators narrow access to specific validators by
# writing additional ClusterRoleBindings (or RoleBindings) with
# resourceNames set — the SAR carries .name=<seinode> per the proxy's
# ConfigMap, so RBAC matches it.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sei-validator-task-submitter
rules:
  - apiGroups: ["sei.io"]
    resources: ["seinodetasks"]
    verbs: ["create", "get", "list"]
