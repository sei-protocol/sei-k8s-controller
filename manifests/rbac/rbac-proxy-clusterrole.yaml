# sei-rbac-proxy carries the K8s API permissions kube-rbac-proxy needs to
# authenticate and authorize incoming requests: TokenReview to resolve a
# bearer token into an identity, SubjectAccessReview to check that
# identity against sei-validator-task-submitter (or any bound role).
#
# This ClusterRole is bound to the ServiceAccount running the SeiNode
# pods — see manifests/samples/clusterrolebinding-rbac-proxy.yaml for a
# template. The proxy and the seictl sidecar share that SA (one
# ServiceAccount per pod is a Kubernetes constraint). The trade-off:
# the seictl sidecar's SA gains TokenReview/SAR permissions it does
# not use. Acceptable for v1 because the seictl container does not
# make K8s API calls in normal operation. A future per-container token
# (projected volume with a dedicated audience) is the cleaner separation
# — tracked as a follow-up.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sei-rbac-proxy
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
