    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SeiNodeGroup is the Schema for the seinodegroups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SeiNodeGroupSpec defines the desired state of a SeiNodeGroup.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy controls what happens to child SeiNodes and managed
                  networking/monitoring resources when the SeiNodeGroup is deleted.
                  "Delete" (default) cascades deletion. "Retain" orphans children
                  and networking resources so they continue running independently.
                enum:
                - Delete
                - Retain
                type: string
              genesis:
                description: |-
                  Genesis configures genesis ceremony orchestration for this group.
                  When set, the controller generates GenesisCeremonyNodeConfig for each
                  child SeiNode and coordinates assembly of the final genesis.json.
                properties:
                  accountBalance:
                    default: 1000000000000000000000usei,1000000000000000000000uusdc,1000000000000000000000uatom
                    description: AccountBalance is the initial balance for each validator's
                      genesis account.
                    type: string
                  accounts:
                    description: Accounts adds non-validator genesis accounts (e.g.
                      for load test funding).
                    items:
                      description: GenesisAccount represents a non-validator genesis
                        account to fund.
                      properties:
                        address:
                          description: Address is the bech32-encoded account address.
                          minLength: 1
                          type: string
                        balance:
                          description: Balance is the initial balance in coin notation
