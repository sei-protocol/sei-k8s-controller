                            type: string
                          namespace:
                            minLength: 1
                            type: string
                          sectionName:
                            description: |-
                              SectionName targets a specific listener on the Gateway (e.g. "https").
                              When omitted, the HTTPRoute attaches to all compatible listeners.
                            type: string
                        required:
                        - name
                        - namespace
                        type: object
                    required:
                    - hostnames
                    - parentRef
                    type: object
