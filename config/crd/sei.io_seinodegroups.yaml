                          - evm-rpc
                          - evm-ws
                          - grpc
                          - p2p
                          - metrics
                          type: string
                        type: array
                        x-kubernetes-list-type: set
                      type:
                        default: ClusterIP
                        description: Type is the Kubernetes Service type.
                        enum:
                        - ClusterIP
                        - LoadBalancer
                        - NodePort
                        type: string
                    type: object
                type: object
                x-kubernetes-validations:
