                      GenesisS3 configures where genesis artifacts are stored.
                      When omitted, inferred: bucket = "sei-genesis-ceremony-artifacts",
                      prefix = "<chainId>/<group-name>/", region from PlatformConfig.
                    properties:
                      bucket:
                        description: Bucket is the S3 bucket name.
                        minLength: 1
                        type: string
                      prefix:
                        description: Prefix is an optional key prefix within the bucket.
                        type: string
                      region:
                        description: Region is the AWS region for S3 access.
                        minLength: 1
                        type: string
                    required:
                    - bucket
                    - region
                    type: object
                  maxCeremonyDuration:
                    description: |-
                      MaxCeremonyDuration is the maximum time from group creation to genesis
                      assembly completion. Default: "15m".
                    type: string
                  overrides:
                    additionalProperties:
                      type: string
                    description: |-
                      Overrides is a flat map of dotted key paths merged on top of sei-config's
