---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: seinetworks.sei.io
spec:
  group: sei.io
  names:
    kind: SeiNetwork
    listKind: SeiNetworkList
    plural: seinetworks
    shortNames:
    - sn
    singular: seinetwork
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.paused
      name: Paused
      type: boolean
    - jsonPath: .status.rollout.targetHash
      name: Target
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SeiNetwork is the Schema for the seinetworks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SeiNetworkSpec defines the desired state of a SeiNetwork.

              A SeiNetwork bootstraps a new Sei chain: a chainId plus a required genesis
              ceremony that mints the chain's genesis.json/genesisHash and its founding
              validator set. spec.genesis is mandatory — the Kind cannot exist without it.
              The replicas are the genesis validators; the template is the validator role.
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy controls what happens to child SeiNodes when the
                  SeiNetwork is deleted. "Delete" (default) cascades deletion. "Retain"
                  orphans children so they continue running independently — required for
                  validator pools, whose PVCs hold node_key.json / priv_validator_key.json.
                enum:
                - Delete
                - Retain
                type: string
              genesis:
                description: |-
                  Genesis is REQUIRED. The ceremony that bootstraps this chain.
                  Immutable once set; enforced by spec-level CEL. A SeiNetwork cannot
                  exist without it.
                properties:
                  accountBalance:
                    default: 1000000000000000000000usei,1000000000000000000000uusdc,1000000000000000000000uatom
                    description: AccountBalance is the initial balance for each validator's
                      genesis account.
                    type: string
                  accounts:
                    description: Accounts adds non-validator genesis accounts (e.g.
                      for load test funding).
                    items:
                      description: GenesisAccount represents a non-validator genesis
                        account to fund.
                      properties:
                        address:
                          description: Address is the bech32-encoded account address.
                          minLength: 1
                          type: string
                        balance:
                          description: Balance is the initial balance in coin notation
                            (e.g. "1000000usei").
                          minLength: 1
                          type: string
                      required:
                      - address
                      - balance
                      type: object
                    type: array
                  chainId:
                    description: |-
                      ChainID for the new network.
                      Constrained to DNS-1123 label characters because child SeiNodes
                      compose it into P2P endpoint hostnames; the address is a one-way
                      door once peers cache it.
                    maxLength: 64
                    minLength: 1
                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                    type: string
                  maxCeremonyDuration:
                    description: |-
                      MaxCeremonyDuration is the maximum time from network creation to genesis
                      assembly completion. Default: "15m".
                    type: string
                  overrides:
                    additionalProperties:
                      x-kubernetes-preserve-unknown-fields: true
                    description: |-
                      Overrides is a flat map of dotted snake_case key paths to JSON values,
                      merged on top of sei-config's GenesisDefaults() before gentx generation.
                      Keys follow cosmos JSON encoding (e.g. "staking.params.unbonding_time")
                      and values are arbitrary JSON (string, number, bool, object, array)
                      matching the type at that path in the underlying genesis schema.
                    type: object
                  stakingAmount:
                    default: 10000000usei
                    description: StakingAmount is the amount each validator self-delegates
                      in its gentx.
                    type: string
                required:
                - chainId
                type: object
              image:
                description: Image is the seid image the genesis validators run.
                type: string
              paused:
                description: |-
                  Paused freezes plan-driven orchestration. While true, no new plans
                  start, no rollouts trigger, no template changes propagate to
                  children, and any active plan freezes in place. Children inherit the
                  paused state.
                type: boolean
              replicas:
                default: 1
                description: Replicas is the number of genesis validators to create.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              template:
                description: |-
                  Template defines the validator-role SeiNode spec stamped out for each
                  genesis validator. Each SeiNode is named "{network-name}-{ordinal}".
                properties:
                  metadata:
                    description: |-
                      Metadata allows setting labels and annotations on child SeiNodes.
                      The controller always adds sei.io/nodedeployment and sei.io/nodedeployment-ordinal
                      labels; user-specified labels are merged.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: Annotations are merged onto each child SeiNode's
                          metadata.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: Labels are merged onto each child SeiNode's metadata.
                        type: object
                    type: object
                  spec:
                    description: Spec is the SeiNodeSpec applied to each replica.
                    properties:
                      archive:
                        description: Archive configures an archive node with full
                          history and no pruning.
                        properties:
                          snapshotGeneration:
                            description: SnapshotGeneration configures periodic snapshot
                              creation and optional upload.
                            properties:
                              tendermint:
                                description: Tendermint configures Tendermint state-sync
                                  snapshot generation.
                                properties:
                                  keepRecent:
                                    description: |-
                                      KeepRecent is the number of recent snapshots to retain on disk.
                                      When Publish is set, must be at least 2 so the upload algorithm can
                                      select the second-to-latest completed snapshot. Otherwise must be at
                                      least 1.
                                    format: int32
                                    minimum: 1
                                    type: integer
                                  publish:
                                    description: |-
                                      Publish, when set, causes the sidecar to upload completed snapshots
                                      to {SEI_SNAPSHOT_BUCKET}/{chainID}/. Absence means snapshots are kept
                                      on disk only and are not uploaded.
                                    type: object
                                required:
                                - keepRecent
                                type: object
                            type: object
                        type: object
                      chainId:
                        description: |-
                          ChainID of the chain this node belongs to.
                          Constrained to DNS-1123 label characters because the controller composes
                          it into P2P endpoint hostnames (e.g. `<node>-p2p.<chainID>.<domain>`) when
                          the parent SND opts into TCP networking; the address is a one-way door
                          once peers cache it.
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                        type: string
                      dataVolume:
                        description: |-
                          DataVolume configures the data PersistentVolumeClaim for this node.
                          When omitted, the controller creates a PVC using the node's mode-default
                          storage class and size (see noderesource.DefaultStorageForMode).
                        properties:
                          import:
                            description: |-
                              Import references a pre-existing PersistentVolumeClaim in the same
                              namespace as the SeiNode, instead of creating a new one. The
                              controller validates the referenced PVC but never mutates it. Storage
                              class is the importer's responsibility — the controller does not
                              validate it.

                              When Import is set, the controller never deletes the referenced PVC
                              on SeiNode deletion — storage lifecycle is the operator's responsibility.
                            properties:
                              pvcName:
                                description: |-
                                  PVCName is the name of a PersistentVolumeClaim in the SeiNode's
                                  namespace. The PVC must be Bound, ReadWriteOnce, and sized at or above
                                  the node mode's default storage size. Immutable after creation.
                                maxLength: 253
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                                type: string
                                x-kubernetes-validations:
                                - message: pvcName is immutable
                                  rule: self == oldSelf
                            required:
                            - pvcName
                            type: object
                        type: object
                        x-kubernetes-validations:
                        - message: import cannot be unset once configured
                          rule: (!has(oldSelf.import) || has(self.import))
                      externalAddress:
                        description: |-
                          ExternalAddress is the routable P2P host:port written into seid's
                          `p2p.external_address`. SND-managed nodes get this stamped by the
                          SND reconciler when TCP networking is enabled. Standalone SeiNodes
                          can set it directly.
                        type: string
                      fullNode:
                        description: FullNode configures a chain-following full node
                          (absorbs the "rpc" role).
                        properties:
                          snapshot:
                            description: |-
                              Snapshot configures how the node obtains its initial chain state.
                              When absent the node block-syncs from genesis.
                            properties:
                              backfillBlocks:
                                description: |-
                                  BackfillBlocks is the number of historical blocks to fetch from peers
                                  after snapshot restore.
                                format: int64
                                type: integer
                              bootstrapImage:
                                description: |-
                                  BootstrapImage is a seid container image used for the bootstrap Job.
                                  When set, the controller runs a one-shot Job with this image and the
                                  seictl sidecar to prepare the node's data PVC before the main StatefulSet
                                  starts. The Job restores a snapshot, applies config, and syncs to the
                                  target height.
                                type: string
                              s3:
                                description: S3 downloads a snapshot archive from
                                  an S3 bucket.
                                properties:
                                  targetHeight:
                                    description: TargetHeight is the block height
                                      the node should sync to after restoring.
                                    format: int64
                                    minimum: 1
                                    type: integer
                                required:
                                - targetHeight
                                type: object
                              stateSync:
                                description: StateSync fetches snapshot chunks from
                                  peers via Tendermint state sync.
                                type: object
                              trustPeriod:
                                description: |-
                                  TrustPeriod is the window during which the snapshot's block validators
                                  are considered trustworthy. Must be long enough to cover the age of
                                  the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                                type: string
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one of s3 or stateSync must be set
                              rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync)
                                ? 1 : 0) == 1'
                          snapshotGeneration:
                            description: |-
                              SnapshotGeneration configures periodic snapshot creation and optional upload.
                              When set, the controller disables pruning and enables snapshot intervals.
                            properties:
                              tendermint:
                                description: Tendermint configures Tendermint state-sync
                                  snapshot generation.
                                properties:
                                  keepRecent:
                                    description: |-
                                      KeepRecent is the number of recent snapshots to retain on disk.
                                      When Publish is set, must be at least 2 so the upload algorithm can
                                      select the second-to-latest completed snapshot. Otherwise must be at
                                      least 1.
                                    format: int32
                                    minimum: 1
                                    type: integer
                                  publish:
                                    description: |-
                                      Publish, when set, causes the sidecar to upload completed snapshots
                                      to {SEI_SNAPSHOT_BUCKET}/{chainID}/. Absence means snapshots are kept
                                      on disk only and are not uploaded.
                                    type: object
                                required:
                                - keepRecent
                                type: object
                            type: object
                        type: object
                      image:
                        description: Image is the seid container image.
                        maxLength: 512
                        minLength: 1
                        type: string
                      overrides:
                        additionalProperties:
                          type: string
                        description: |-
                          Overrides is a flat map of dotted TOML key paths to string values.
                          Keys use the sei-config unified schema (e.g. "evm.http_port", "storage.pruning").
                          These are applied on top of mode defaults during config-apply.
                        type: object
                      paused:
                        description: |-
                          Paused freezes reconciliation. While true, the controller does not
                          advance the lifecycle, start plans, or mutate derived resources
                          except the owned StatefulSet — which scales to Replicas=0 so pods
                          terminate. In-flight tasks on the cluster run to completion but
                          their results are not polled until the field is cleared.
                          Has no effect on nodes in PhaseFailed; delete and recreate to
                          recover from a failed node.
                        type: boolean
                      peers:
                        description: |-
                          Peers configures how this node discovers and connects to network peers.
                          Applies to all node modes. Required for replayer nodes.
                        items:
                          description: PeerSource is a union type — exactly one field
                            must be set.
                          properties:
                            ec2Tags:
                              description: |-
                                EC2Tags discovers peers by querying EC2 for running instances
                                matching the specified tags.
                              properties:
                                region:
                                  description: Region is the AWS region to query for
                                    EC2 instances.
                                  minLength: 1
                                  type: string
                                tags:
                                  additionalProperties:
                                    type: string
                                  description: Tags are the EC2 instance tags to filter
                                    on.
                                  minProperties: 1
                                  type: object
                              required:
                              - region
                              - tags
                              type: object
                            label:
                              description: |-
                                Label discovers peers by selecting SeiNode resources via
                                Kubernetes labels. The controller resolves matching nodes to
                                stable headless Service DNS names and tracks them in
                                status.resolvedPeers. The sidecar queries each for its
                                Tendermint node ID at task execution time.
                              properties:
                                namespace:
                                  description: |-
                                    Namespace restricts discovery to a specific namespace.
                                    When empty, defaults to the namespace of the discovering node.
                                  type: string
                                selector:
                                  additionalProperties:
                                    type: string
                                  description: |-
                                    Selector is a set of key-value label pairs. SeiNode resources
                                    matching ALL labels are included as peers.
                                  minProperties: 1
                                  type: object
                              required:
                              - selector
                              type: object
                            static:
                              description: Static provides a fixed list of peer addresses.
                              properties:
                                addresses:
                                  description: Addresses is a list of peer addresses
                                    in "nodeId@host:port" format.
                                  items:
                                    type: string
                                  minItems: 1
                                  type: array
                              required:
                              - addresses
                              type: object
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of ec2Tags, static, or label must
                              be set
                            rule: '(has(self.ec2Tags) ? 1 : 0) + (has(self.static)
                              ? 1 : 0) + (has(self.label) ? 1 : 0) == 1'
                        type: array
                      podLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          PodLabels are additional labels merged into the StatefulSet pod template.
                          The controller always sets sei.io/node; these are additive and applied
                          first so that system labels take precedence.
                          Must be set before the StatefulSet is first created; changes after
                          creation require StatefulSet recreation due to selector immutability.
                        type: object
                      replayer:
                        description: Replayer configures an ephemeral replay workload
                          that restores from a snapshot.
                        properties:
                          resultExport:
                            description: |-
                              ResultExport configures block-execution result export. Select one or more
                              sub-structs (e.g., shadowResult) to enable an export mode. Useful for
                              shadow replayers that compare execution results against the canonical chain.
                            properties:
                              shadowResult:
                                description: |-
                                  ShadowResult configures the node to generate and export shadow-result
                                  pages, comparing local block execution results against a canonical
                                  chain via app-hash divergence detection.
                                properties:
                                  canonicalRpc:
                                    description: |-
                                      CanonicalRPC is the HTTP RPC endpoint of the canonical chain node
                                      to compare block-execution results against.
                                    minLength: 1
                                    type: string
                                required:
                                - canonicalRpc
                                type: object
                            type: object
                          snapshot:
                            description: Snapshot identifies the snapshot to restore
                              from before replay begins.
                            properties:
                              backfillBlocks:
                                description: |-
                                  BackfillBlocks is the number of historical blocks to fetch from peers
                                  after snapshot restore.
                                format: int64
                                type: integer
                              bootstrapImage:
                                description: |-
                                  BootstrapImage is a seid container image used for the bootstrap Job.
                                  When set, the controller runs a one-shot Job with this image and the
                                  seictl sidecar to prepare the node's data PVC before the main StatefulSet
                                  starts. The Job restores a snapshot, applies config, and syncs to the
                                  target height.
                                type: string
                              s3:
                                description: S3 downloads a snapshot archive from
                                  an S3 bucket.
                                properties:
                                  targetHeight:
                                    description: TargetHeight is the block height
                                      the node should sync to after restoring.
                                    format: int64
                                    minimum: 1
                                    type: integer
                                required:
                                - targetHeight
                                type: object
                              stateSync:
                                description: StateSync fetches snapshot chunks from
                                  peers via Tendermint state sync.
                                type: object
                              trustPeriod:
                                description: |-
                                  TrustPeriod is the window during which the snapshot's block validators
                                  are considered trustworthy. Must be long enough to cover the age of
                                  the snapshot (e.g. "9999h0m0s" for old S3 snapshots).
                                type: string
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one of s3 or stateSync must be set
                              rule: '(has(self.s3) ? 1 : 0) + (has(self.stateSync)
                                ? 1 : 0) == 1'
                        required:
                        - snapshot
                        type: object
                      sidecar:
                        description: Sidecar configures the sei-sidecar container.
                        properties:
                          image:
                            description: Image overrides the sidecar container image.
                            type: string
                          port:
                            default: 7777
                            description: Port is the HTTP port the sidecar listens
                              on.
                            format: int32
                            type: integer
                          resources:
                            description: Resources defines CPU/memory requests and
                              limits for the sidecar container.
                            properties:
                              claims:
                                description: |-
                                  Claims lists the names of resources, defined in spec.resourceClaims,
                                  that are used by this container.

                                  This field depends on the
                                  DynamicResourceAllocation feature gate.

                                  This field is immutable. It can only be set for containers.
                                items:
                                  description: ResourceClaim references one entry
                                    in PodSpec.ResourceClaims.
                                  properties:
                                    name:
                                      description: |-
                                        Name must match the name of one entry in pod.spec.resourceClaims of
                                        the Pod where this field is used. It makes that resource available
                                        inside a container.
                                      type: string
                                    request:
                                      description: |-
                                        Request is the name chosen for a request in the referenced claim.
                                        If empty, everything from the claim is made available, otherwise
                                        only the result of this request.
                                      type: string
                                  required:
                                  - name
                                  type: object
                                type: array
                                x-kubernetes-list-map-keys:
                                - name
                                x-kubernetes-list-type: map
                              limits:
                                additionalProperties:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                description: |-
                                  Limits describes the maximum amount of compute resources allowed.
                                  More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                                type: object
                              requests:
                                additionalProperties:
                                  anyOf:
                                  - type: integer
                                  - type: string
                                  pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                                  x-kubernetes-int-or-string: true
                                description: |-
                                  Requests describes the minimum amount of compute resources required.
                                  If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                                  otherwise to an implementation-defined value. Requests cannot exceed Limits.
                                  More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                                type: object
                            type: object
                        type: object
                      validator:
                        description: Validator configures a consensus-participating
                          validator node.
                        properties:
                          genesisCeremony:
                            description: |-
                              GenesisCeremony indicates this validator participates in a network genesis
                              ceremony. Set by the SeiNetwork controller — not intended for direct use.
                            properties:
                              accountBalance:
                                description: |-
                                  AccountBalance is the initial coin balance to fund this validator's
                                  genesis account. The node's own address is discovered during identity
                                  generation — no cross-node coordination needed.
                                minLength: 1
                                type: string
                              chainId:
                                description: ChainID of the genesis network.
                                minLength: 1
                                type: string
                              index:
                                description: Index is the node's ordinal within the
                                  group (0-based).
                                format: int32
                                minimum: 0
                                type: integer
                              stakingAmount:
                                description: StakingAmount is the self-delegation
                                  amount for this validator's gentx.
                                minLength: 1
                                type: string
                            required:
                            - accountBalance
                            - chainId
                            - index
                            - stakingAmount
                            type: object
                          nodeKey:
                            description: |-
                              NodeKey declares the source of this validator's P2P node key
                              (node_key.json). Determines the validator's permanent libp2p node ID
                              for peer connections. Must be paired with SigningKey — validators
                              without consensus identity have no need for a stable network identity.

                              Mounted only on the production StatefulSet pod, not the bootstrap Job.
                              The bootstrap pod uses an ephemeral node ID generated by `seid init`
                              for its short-lived sync window; the validator's permanent node ID
                              first appears on the network when the production pod starts.
                            properties:
                              secret:
                                description: |-
                                  Secret loads the node key from a Kubernetes Secret in the
                                  SeiNode's namespace.
                                properties:
                                  secretName:
                                    description: |-
                                      SecretName is the name of a Secret in the SeiNode's namespace.
                                      The controller never creates, mutates, or deletes this Secret.
                                      Immutable: re-pointing the node ID on a running validator costs
                                      peer reputation and forces a peer-graph reset; force delete-and-recreate.
                                    maxLength: 253
                                    minLength: 1
                                    pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                                    type: string
                                    x-kubernetes-validations:
                                    - message: secretName is immutable
                                      rule: self == oldSelf
                                required:
                                - secretName
                                type: object
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one node key source must be set
                              rule: '(has(self.secret) ? 1 : 0) == 1'
                          operatorKeyring:
                            description: |-
                              OperatorKeyring declares the source of this validator's operator-account
                              keyring used by the sidecar to sign and broadcast governance,
                              MsgEditValidator, withdraw-rewards, and other operator-account
                              transactions.

                              Independently optional from signingKey/nodeKey: a validator may run as a
                              non-signing observer with operatorKeyring set (governance-only
                              operations), or as a consensus-signing validator without operatorKeyring
                              (governance performed out-of-band).

                              Mounted exclusively on the sidecar container; the seid main container
                              and bootstrap pods never carry this material.
                            properties:
                              secret:
                                description: |-
                                  Secret sources the keyring from a file-backend Secret in the SeiNode's
                                  namespace, projected at $SEI_HOME/keyring-file/.
                                properties:
                                  keyName:
                                    default: node_admin
                                    description: |-
                                      KeyName is the name of the keyring entry to use when signing
                                      (the name passed to `seid keys add <name>`). Defaults to
                                      "node_admin" to preserve continuity with the seienv convention.
                                      Mutable — rotating to a different entry within the same Secret
                                      is a routine operator-account change, not a slashing risk.

                                      The default literal below MUST match DefaultOperatorKeyName —
                                      kubebuilder markers cannot reference Go constants.
                                    maxLength: 64
                                    pattern: ^[a-zA-Z0-9_-]+$
                                    type: string
                                  passphraseSecretRef:
                                    description: |-
                                      PassphraseSecretRef names a separate Secret containing the keyring
                                      unlock passphrase. Required for the file backend.
                                    properties:
                                      key:
                                        description: |-
                                          Key is the data key inside the Secret holding the passphrase.
                                          Required — operators declare this explicitly rather than relying on
                                          a default that hides where the passphrase actually lives.
                                        maxLength: 253
                                        minLength: 1
                                        type: string
                                      secretName:
                                        description: SecretName names the passphrase
                                          Secret in the SeiNode's namespace.
                                        maxLength: 253
                                        minLength: 1
                                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                                        type: string
                                        x-kubernetes-validations:
                                        - message: passphrase secretName is immutable
                                          rule: self == oldSelf
                                    required:
                                    - key
                                    - secretName
                                    type: object
                                  secretName:
                                    description: |-
                                      SecretName names a Secret in the SeiNode's namespace whose data keys
