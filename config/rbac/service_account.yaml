apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: sei-k8s-controller
    app.kubernetes.io/managed-by: kustomize
  name: controller-manager
  namespace: system
  # EC2 peering needs ec2:DescribeInstances on the controller's IRSA role,
  # provisioned out-of-band in Terraform (like the existing S3 access). During
  # migration both this controller and the sidecar's SeiNode SA hold the grant;
  # the SeiNode SA grant is removed after the sidecar DiscoverPeers handler is
  # retired. See PLT-452. No IAM JSON in the manifest.
