apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: sei-k8s-controller
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
      app.kubernetes.io/name: sei-k8s-controller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
        app.kubernetes.io/name: sei-k8s-controller
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - command:
        - /manager
        args:
          - --metrics-bind-address=:8080
          - --leader-elect
          - --health-probe-bind-address=:8081
        image: 189176372795.dkr.ecr.us-east-2.amazonaws.com/sei/sei-k8s-controller:8b3f1749067bd07140fccd6d05da7894754688ca
        name: manager
        env:
          # Infra config (node pools, storage, resources, snapshot/genesis/
          # result-export buckets, images) is sourced from the mounted
          # app-config ConfigMap (SEI_CONTROLLER_CONFIG below); see the
          # controller-app-config schema in bdchatham-designs (relocated per
          # Design 05 / PLT-497). Gateway config stays env-sourced
          # pending its removal from the controller in PLT-451.
          - name: SEI_GATEWAY_NAME
            value: sei-gateway
          - name: SEI_GATEWAY_NAMESPACE
            value: gateway
          - name: SEI_GATEWAY_DOMAIN
            value: prod.platform.sei.io
          # Read-only application-config source. Points at the mounted ConfigMap
          # (directory mount, not subPath) so GitOps swaps propagate without a
          # pod restart. Optional: the controller fails closed when absent.
          - name: SEI_CONTROLLER_CONFIG
            value: /etc/sei-controller/config.yaml
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
        volumeMounts:
          # Directory mount (not subPath): subPath snapshots the ConfigMap at
          # mount time and never updates, defeating the fresh-read-per-reconcile
          # contract. readOnly so the controller can't rewrite its trust root.
          - name: sei-controller-config
            mountPath: /etc/sei-controller
            readOnly: true
      volumes:
        # GitOps provisions the ConfigMap content out of this repo. optional so
        # the controller starts (and fails closed) when it isn't present yet.
        - name: sei-controller-config
          configMap:
            name: sei-controller-config
            optional: true
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
