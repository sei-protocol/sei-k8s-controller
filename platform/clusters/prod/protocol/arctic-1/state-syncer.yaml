# SeiNode — Arctic-1 State Syncer
#
# Full node that bootstraps via state sync and serves as a peer for
# other nodes in the network. Keeps recent blocks for state sync serving.
#
# Deployed first. Uses EC2 peers only — no label source because there
# are no K8s siblings yet at deploy time (chicken-and-egg: the label
# source hard-fails in the sidecar if endpoints are empty at plan build).
apiVersion: sei.io/v1alpha1
kind: SeiNode
metadata:
  name: arctic-1-state-syncer
  namespace: default
  labels:
    sei.io/chain: arctic-1
spec:
  chainId: arctic-1
  image: "ghcr.io/sei-protocol/sei:v6.3.0"

  sidecar:
    image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

  entrypoint:
    command: ["seid"]
    args: ["start", "--home", "/sei"]

  peers:
    - ec2Tags:
        region: us-east-2
        tags:
          ChainIdentifier: arctic-1
          Component: state-syncer

  fullNode:
    snapshot:
      stateSync: {}
      trustPeriod: "9999h0m0s"
