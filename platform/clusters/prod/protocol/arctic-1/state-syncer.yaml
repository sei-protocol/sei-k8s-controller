# SeiNodeGroup — Arctic-1 State Syncer
#
# State sync full node that serves as a peer source for other nodes.
# Deployed first — uses EC2 peers only (no label source) because there
# are no K8s siblings yet at deploy time.
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: arctic-1-state-syncer
  namespace: default
spec:
  replicas: 1
  deletionPolicy: Retain

  template:
    metadata:
      labels:
        sei.io/chain: arctic-1
        sei.io/role: state-syncer
    spec:
      chainId: arctic-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

      peers:
        - ec2Tags:
            region: us-east-2
            tags:
              ChainIdentifier: arctic-1
              Component: state-syncer

      fullNode:
        snapshot:
          stateSync: {}
          trustPeriod: "9999h0m0s"

  networking:
    service:
      type: ClusterIP
      ports:
        - rpc
        - p2p
        - metrics

  monitoring:
    serviceMonitor:
      interval: "30s"
      labels:
        release: prometheus
