# SeiNodeGroup — Arctic-1 Archive (Snapshotter)
#
# Archive node that retains full block history and generates periodic
# snapshots for consumption by other nodes.
#
# Deploy after the state-syncer reaches Running so the label source
# resolves at least one K8s peer.
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: arctic-1-archive
  namespace: default
spec:
  replicas: 1
  deletionPolicy: Retain

  template:
    metadata:
      labels:
        sei.io/chain: arctic-1
        sei.io/role: archive
    spec:
      chainId: arctic-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

      peers:
        - ec2Tags:
            region: us-east-2
            tags:
              ChainIdentifier: arctic-1
              Component: state-syncer
        - label:
            selector:
              sei.io/chain: arctic-1

      archive:
        snapshotGeneration:
          keepRecent: 5

  networking:
    service:
      type: ClusterIP
      ports:
        - rpc
        - p2p
        - metrics

  monitoring:
    serviceMonitor:
      interval: "30s"
      labels:
        release: prometheus
