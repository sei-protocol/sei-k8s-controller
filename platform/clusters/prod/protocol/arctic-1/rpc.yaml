# SeiNodeGroup — Arctic-1 RPC Nodes
#
# Fleet of full nodes serving RPC traffic. Bootstraps via state sync
# from EC2 state-syncer peers.
apiVersion: sei.io/v1alpha1
kind: SeiNodeGroup
metadata:
  name: arctic-1-rpc
  namespace: default
spec:
  replicas: 2

  template:
    metadata:
      labels:
        sei.io/role: rpc
    spec:
      chainId: arctic-1
      image: "ghcr.io/sei-protocol/sei:v6.3.0"

      entrypoint:
        command: ["seid"]
        args: ["start", "--home", "/sei"]

      sidecar:
        image: ghcr.io/sei-protocol/seictl@sha256:2cb320dd583000765520293d4e28ecc79fed4432c76760923d3aaa47803a4dbf

      peers:
        - ec2Tags:
            region: us-east-2
            tags:
              ChainIdentifier: arctic-1
              Component: state-syncer

      fullNode:
        snapshot:
          stateSync: {}
          trustPeriod: "9999h0m0s"
