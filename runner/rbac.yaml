# RBAC for seitask-runner — apply alongside each Chaos Mesh Workflow that uses
# the runner image. The Workflow's `task.container.serviceAccountName` must
# reference this ServiceAccount.
#
# Namespaced (Role, not ClusterRole) — the runner only operates on resources
# in the same namespace as the Workflow.
#
# The `configmaps` verbs cover the PR 6 cross-step variable bridge: bash
# steps (compute-target-height, resolve-proposal-id) upsert
# `workflow-vars-<run-id>` via `kubectl apply`, and every other step reads
# values via `envFrom: configMapRef`. The kubelet itself needs no extra
# RBAC for the envFrom read — it uses kubelet credentials, not the
# workload SA — but the producer steps run `kubectl get/create/apply`
# under the workload SA and therefore require these verbs.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: seitask-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: seitask-runner
rules:
# SeiNodeTask: create + read + SSA-patch (apply uses PATCH with
# application/apply-patch+yaml, which requires the `patch` verb in addition
# to `create` — `create` alone 403s on the second invocation).
- apiGroups: ["sei.io"]
  resources: ["seinodetasks"]
  verbs: ["create", "get", "list", "watch", "patch", "update"]
- apiGroups: ["sei.io"]
  resources: ["seinodetasks/status"]
  verbs: ["get"]
# SeiNode: read-only, for --per-node-selector fan-out mode. Omit if your
# Workflows only use single-node invocations.
- apiGroups: ["sei.io"]
  resources: ["seinodes"]
  verbs: ["get", "list", "watch"]
# SeiNodeDeployment: create + read for provision-snd. Polls .status.phase
# until Ready and reads .status.endpoints to publish role-scoped TM/REST/
# EVM URLs into workflow-vars.
- apiGroups: ["sei.io"]
  resources: ["seinodedeployments"]
  verbs: ["create", "get", "list", "watch"]
- apiGroups: ["sei.io"]
  resources: ["seinodedeployments/status"]
  verbs: ["get"]
# Secrets: get + create + patch for keygen. Patch covers Task-retry
# within the same Workflow CR — a re-run of keygen-admin after a partial
# failure would otherwise 409 on Create. Downstream Tasks consume the
# Secret via secretKeyRef under kubelet credentials, no RBAC needed.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "create", "patch"]
# ConfigMaps: workflow-vars-<run-id> upsert by producer bash steps.
# `create`+`patch` are the apply-path verbs; `get`+`list`+`watch` support
# read-modify-write (resolve-proposal-id merges PROPOSAL_ID into the
# existing object); `update` covers the non-SSA apply path some kubectl
# versions emit.
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "patch", "update"]
# Chaos Mesh Workflow: read-only. compute-target-height looks up the
# parent Workflow CR's UID so it can stamp the workflow-vars ConfigMap
# with an ownerReference. Deletion of the Workflow then cascades
# garbage-collection of the ConfigMap automatically.
- apiGroups: ["chaos-mesh.org"]
  resources: ["workflows"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: seitask-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: seitask-runner
subjects:
- kind: ServiceAccount
  name: seitask-runner
