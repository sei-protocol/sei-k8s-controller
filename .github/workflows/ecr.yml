name: ECR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (defaults to git sha)"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::189176372795:role/common/gha
          role-duration-seconds: 900
          aws-region: us-east-2

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push controller image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ecr-login.outputs.registry }}/sei/sei-k8s-controller:${{ inputs.tag || github.sha }}
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared,mode=max

      # The runner image is the orchestration container used by Chaos Mesh
      # Workflows in scenarios/ — it ships its own per-kind Go text templates
      # and applies SeiNodeTask CRs via the dynamic client. Built from the
      # same repo context as the controller; the only difference is the
      # Dockerfile path.
      - name: Build and push seitask-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: runner/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ecr-login.outputs.registry }}/sei/seitask-runner:${{ inputs.tag || github.sha }}
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared,mode=max

      # The seitask image is the new monolithic Workflow-Task primitive
      # binary: one image, multiple urfave/cli subcommands (keygen,
      # provision-snd, upload-report, ...) per docs/design/test-harness-lld.md.
      # Co-built with the controller manager and seitask-runner so all three
      # share the same commit SHA in scenario pins.
      - name: Build and push seitask image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/seitask/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.ecr-login.outputs.registry }}/sei/seitask:${{ inputs.tag || github.sha }}
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/sei/build-cache:shared,mode=max
